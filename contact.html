<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECOMOC | Contact</title>

<!-- FONT AWESOME -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

/* =====================
   GLOBAL
===================== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    background: linear-gradient(135deg,#eef2f7,#ffffff);
    color:#1a1a1a;
}

/* =====================
   NAVBAR (FIXED)
===================== */
/* =====================
   NAVBAR (MATCHES ABOUT PAGE)
===================== */

.navbar{
    max-width:1200px;
    margin:25px auto 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    padding:0;
    background:transparent;
    border:none;
    box-shadow:none;
    position:relative;
}

.logo{
    display:flex;
    flex-direction:column;
}

.logo h2{
    font-size:20px;
    font-weight:700;
    color:#111;
    margin:0;
}

.logo p{
    font-size:12px;
    color:#6c7180;
    margin-top:3px;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:10px;
    list-style:none;
    margin-left:auto;
}

.nav-links li{
    list-style:none;
}

.nav-links a{
    text-decoration:none;
    color:#111;
    font-weight:600;
    padding:8px 14px;
    border-radius:8px;
    transition:.3s;
}

.nav-links a:hover,
.nav-links a.active{
    background:#f3f5fa;
    color:#4169E1;
}

.top-logo img{
    height:42px;
    width:auto;
    margin-left:12px;
    border-radius:10px;
    object-fit:contain;
}
/* =====================
   HERO (REDUCED GAP FIX)
===================== */
.contact-hero{
    margin-top:80px;
    padding:70px 6%;
    text-align:center;
}

.contact-hero h1{
    font-size:38px;
    margin-bottom:10px;
}

.contact-hero p{
    color:#555;
    max-width:700px;
    margin:auto;
    line-height:1.6;
}

/* =====================
   CONTACT SECTION
===================== */
.contact-section{
    display:grid;
    grid-template-columns: 1fr 1fr;
    gap:30px;
    padding:40px 6%;
}

/* LEFT */
.contact-left{
    display:flex;
    flex-direction:column;
    gap:18px;
}

/* CONTACT CARD */
.contact-card{
    display:flex;
    align-items:center;
    gap:15px;
    padding:18px;
    border-radius:12px;
    background:#fff;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    text-decoration:none;
    color:#111;
    transition:0.3s;
}

.contact-card:hover{
    transform:translateY(-5px);
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* ICON */
.contact-card i{
    font-size:20px;
    color:#0071e3;
    width:40px;
}

/* SOCIAL ROW */
.social-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
}

.social-row a{
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    background:#fff;
    box-shadow:0 5px 15px rgba(0,0,0,0.05);
    color:#0071e3;
    text-decoration:none;
    transition:0.3s;
}

.social-row a:hover{
    background:#0071e3;
    color:#fff;
}

/* RIGHT MAP */
.map-box{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.map-box iframe{
    width:100%;
    height:420px;
    border:none;
}

/* FOOTER */
footer{
    text-align:center;
    padding:30px;
    margin-top:40px;
    color:#666;
    font-size:14px;
}

footer span{
    color:#0071e3;
    font-weight:600;
}

/* RESPONSIVE */
@media(max-width:900px){
    .contact-section{
        grid-template-columns:1fr;
    }

    .nav-links{
        display:none;
    }
}

</style>
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">

    <div class="logo">
        <h2>ECOMOC</h2>
    </div>

    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact.html" class="active">Contact</a></li>
    </ul>

    <div class="top-logo">
        <img src="e-logo.JPG" alt="logo">
    </div>

</header>

<!-- HERO -->
<section class="contact-hero">
    <h1>Contact ECOMOC</h1>
    <p>We are ready to connect with you for business, partnerships, and support. Reach us through any of the channels below.</p>
</section>

<!-- CONTACT -->
<section class="contact-section">

    <!-- LEFT -->
    <div class="contact-left">

        <a href="tel:+233372096683 " class="contact-card">
            <i class="fas fa-phone"></i>
            <div>Call Us</div>
        </a>
         <a href="tel:+233598978686 " class="contact-card">
            <i class="fas fa-phone"></i>
            <div>Call Us</div>
        </a>

        <a href="https://wa.me/233598978686 "" class="contact-card" target="_blank">
            <i class="fab fa-whatsapp"></i>
            <div>WhatsApp</div>
        </a>

        <a href="mailto:ecomoctrade@gmail.com" class="contact-card">
            <i class="fas fa-envelope"></i>
            <div>Email Us</div>
        </a>

        <!-- SOCIAL -->
        <div class="social-row">

            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-x-twitter"></i></a>
            <a href="#"><i class="fab fa-linkedin-in"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>

        </div>

    </div>

    <!-- RIGHT MAP -->
    <div class="map-box">
        <iframe
        src="https://maps.google.com/maps?q=Accra,Ghana&z=12&output=embed">
        </iframe>
    </div>

</section>

<!-- FOOTER -->
<footer>
    Website Developed by <span>ARQ Digital Solutions</span> | Contact: 0536863961
</footer>

</body>
</html>
